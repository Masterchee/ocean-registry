<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Underwater Registry 🐚</title>
    <style>
        /* --- AQUARIUM THEME --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(180deg, #0077be 0%, #003366 100%);
            background-attachment: fixed; color: #fff; overflow-x: hidden;
        }

        .bubble {
            position: fixed; bottom: -50px; background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%; pointer-events: none; animation: rise 10s infinite ease-in; z-index: 0;
        }

        @keyframes rise {
            0% { bottom: -50px; transform: translateX(0); opacity: 1; }
            100% { bottom: 110vh; transform: translateX(50px); opacity: 0; }
        }

        h2 { color: #e0f7fa; text-shadow: 0 0 15px rgba(0, 184, 212, 0.8); text-align: center; font-size: 2.2rem; margin-bottom: 5px; }
        .deploy-tag { text-align: center; font-size: 0.8em; color: #00e676; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        /* Dashboard Responsive Layout */
        .dashboard { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; position: relative; z-index: 2; }
        .stat-card { flex: 1; min-width: 120px; backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .stat-val { font-size: 1.8em; font-weight: bold; margin-top: 5px; }

        .search-container { position: relative; z-index: 2; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        #search-input { width: 100%; padding: 15px; border: 2px solid #00b8d4; border-radius: 30px; background: rgba(0,0,0,0.4); color: white; font-size: 16px; outline: none; box-sizing: border-box;}

        /* --- TABLE & MOBILE CARDS --- */
        .table-container { position: relative; z-index: 2; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; color: #fff; min-width: 600px; }
        
        @media screen and (max-width: 900px) {
            thead { display: none; }
            tr { display: block; margin-bottom: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; border: 1px solid rgba(0, 184, 212, 0.3); }
            td { display: flex; justify-content: space-between; padding: 8px 5px; border: none; font-size: 0.9em; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
            td:last-child { border-bottom: none; }
            td::before { content: attr(data-label); font-weight: bold; color: #84ffff; text-transform: uppercase; font-size: 0.75em; text-align: left; }
            button { width: 48%; margin-top: 5px; }
        }

        @media screen and (min-width: 901px) {
            th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
            th { background: rgba(0, 119, 190, 0.6); color: #84ffff; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: 0.3s; }
            th:hover { background: rgba(0, 184, 212, 0.8); color: #fff; }
            .search-container { flex-direction: row; }
        }

        .edit-input { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #00e5ff; background: white; color: #333; }
        .timestamp { font-size: 0.85em; color: #80deea; font-style: italic; }
        .source-tag { background: rgba(132, 255, 255, 0.15); padding: 4px 8px; border-radius: 5px; font-size: 0.85em; color: #84ffff; border: 1px solid rgba(132, 255, 255, 0.3); }

        .controls { position: relative; z-index: 2; margin-top: 30px; padding: 25px; background: rgba(0, 51, 102, 0.8); border-radius: 20px; border: 1px solid #00b8d4; }
        .auth-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        
        button { padding: 10px 20px; background: #00e5ff; color: #003366; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-delete { background: #ff5252; color: white; }
        .btn-edit { background: #ffa726; color: white; }
        .btn-save { background: #00e676; color: white; }
        .btn-export { background: #ffeb3b; color: #333; }
        
        .input-group label { display: block; margin-top: 10px; font-size: 0.8em; color: #84ffff; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: rgba(255,255,255,0.1); border: 1px solid #00b8d4; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="bubble-container"></div>

    <h2>🔱 Sea Creatures table</h2>
    <div class="deploy-tag">● Live Data Monitoring System</div>

    <div class="dashboard">
        <div class="stat-card" style="background: rgba(0, 184, 212, 0.2);">
            <div style="font-size: 0.7em; letter-spacing: 1px;">TOTAL SPECIES</div>
            <div id="stat-total" class="stat-val">0</div>
        </div>
        <div class="stat-card" style="background: rgba(255, 82, 82, 0.2);">
            <div style="font-size: 0.7em; letter-spacing: 1px;">ENDANGERED</div>
            <div id="stat-endangered" class="stat-val">0</div>
        </div>
        <div class="stat-card" style="background: rgba(0, 230, 118, 0.2);">
            <div style="font-size: 0.7em; letter-spacing: 1px;">STABLE/SECURE</div>
            <div id="stat-stable" class="stat-val">0</div>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-input" onkeyup="filterTable()" placeholder="🔍 Search name, science, status, or source (e.g., 'IUCN')...">
        <button class="btn-export" onclick="exportToCSV()">📤 Export CSV</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th onclick="sortData('sea_creature')">🧬 Creature</th>
                    <th onclick="sortData('scientific_name')">📖 Scientific</th>
                    <th onclick="sortData('status')">📍 Status</th>
                    <th onclick="sortData('source')">📋 Source</th>
                    <th onclick="sortData('created_at')">🕒 Recorded</th>
                    <th>⚙️ Actions</th>
                </tr>
            </thead>
            <tbody id="creature-table-body"></tbody>
        </table>
    </div>

    <div class="controls">
        <h3>🛠 Station Management</h3>
        <div id="login-section" class="auth-box">
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-password" placeholder="Password">
            <button style="margin-top:10px; width: 100%;" onclick="adminSignIn()">🔑 Authenticate Admin</button>
        </div>
        <div id="auth-status" style="margin-bottom:15px; font-weight:bold; font-size: 0.9em; color: #84ffff;">Status: 🌊 Public Viewing Mode</div>
        
        <hr style="margin: 20px 0; opacity: 0.2;">

        <div class="input-group">
            <label>Sea Creature Name</label><input type="text" id="new-common-name" placeholder="e.g. Whale Shark">
            <label>Scientific Designation</label><input type="text" id="new-scientific-name" placeholder="e.g. Rhincodon typus">
            <label>Conservation Status</label><input type="text" id="new-status" placeholder="e.g. Endangered">
            <label>Data Source</label><input type="text" id="new-source" placeholder="e.g. IUCN Red List">
        </div>
        <br><button style="width: 100%;" onclick="addNewCreature()">✨ Add Species to Ledger</button>

        <div style="margin-top:30px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:20px;">
            <h4>🚢 Bulk CSV Import</h4>
            <p id="progress-text" style="font-size: 0.8em; color: #84ffff; display: none;"></p>
            <div id="progress-container" style="width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-bottom: 15px; display: none; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: #00e676; transition: width 0.3s;"></div>
            </div>
            <input type="file" id="csv-file" accept=".csv" style="color:#fff; margin-bottom:15px;"><br>
            <button id="csv-btn" style="background: #00e676; width: 100%;" onclick="uploadCSV()">📥 Deploy CSV Data</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _URL = 'https://dfuqjromqjmpeeymiejx.supabase.co'; 
        const _KEY = 'sb_publishable_Tow5s3qQR_3ZOXZpDrjl4Q_a5xFXCRX';             
        const sb = window.supabase.createClient(_URL, _KEY);
        let currentData = [], filteredData = [], sortOrder = true;

        function createBubbles() {
            const container = document.getElementById('bubble-container');
            for (let i = 0; i < 12; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 20 + 10 + "px";
                bubble.style.width = bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + "vw";
                bubble.style.animationDelay = Math.random() * 10 + "s";
                bubble.style.animationDuration = Math.random() * 5 + 7 + "s";
                container.appendChild(bubble);
            }
        }
        createBubbles();

        function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Unknown'; }

        async function loadCreatures() {
            const { data, error } = await sb.from('Sea Creatures').select('*');
            if (!error) { currentData = filteredData = data; renderTable(currentData); }
        }

        function updateStats(list) {
            document.getElementById('stat-total').innerText = list.length;
            const end = list.filter(c => (c.status || "").toLowerCase().match(/endangered|critical/)).length;
            const sta = list.filter(c => (c.status || "").toLowerCase().match(/stable|researching|least concern|secure/)).length;
            document.getElementById('stat-endangered').innerText = end;
            document.getElementById('stat-stable').innerText = sta;
        }

        function renderTable(list) {
            const body = document.getElementById('creature-table-body');
            body.innerHTML = ''; updateStats(list);
            list.forEach(c => {
                body.innerHTML += `<tr id="row-${c.id}">
                    <td data-label="Creature" class="col-name">${c.sea_creature || 'Unknown'}</td>
                    <td data-label="Scientific" class="col-science">${c.scientific_name || 'N/A'}</td>
                    <td data-label="Status" class="col-status">${c.status || 'N/A'}</td>
                    <td data-label="Source" class="col-source"><span class="source-tag">${c.source || 'N/A'}</span></td>
                    <td data-label="Recorded" class="timestamp">${formatDate(c.created_at)}</td>
                    <td data-label="Actions" id="actions-${c.id}">
                        <button class="btn-edit" onclick="enterEditMode(${c.id})">✏️</button>
                        <button class="btn-delete" onclick="deleteCreature(${c.id}, '${c.sea_creature}')">🗑</button>
                    </td>
                </tr>`;
            });
        }

        async function adminSignIn() {
            const email = document.getElementById('admin-email').value, password = document.getElementById('admin-password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            const status = document.getElementById('auth-status');
            if (error) { status.innerText = "❌ Login Error: " + error.message; status.style.color = "#ff5252"; }
            else { status.innerText = "✅ Research Station Unlocked"; status.style.color = "#00e676"; document.getElementById('login-section').style.display = "none"; }
        }

        function enterEditMode(id) {
            const row = document.getElementById(`row-${id}`);
            const name = row.querySelector('.col-name').innerText, sci = row.querySelector('.col-science').innerText, sts = row.querySelector('.col-status').innerText, src = row.querySelector('.source-tag').innerText;
            row.querySelector('.col-name').innerHTML = `<input type="text" class="edit-input" id="edit-name-${id}" value="${name}">`;
            row.querySelector('.col-science').innerHTML = `<input type="text" class="edit-input" id="edit-sci-${id}" value="${sci}">`;
            row.querySelector('.col-status').innerHTML = `<input type="text" class="edit-input" id="edit-sts-${id}" value="${sts}">`;
            row.querySelector('.col-source').innerHTML = `<input type="text" class="edit-input" id="edit-src-${id}" value="${src}">`;
            document.getElementById(`actions-${id}`).innerHTML = `<button class="btn-save" onclick="saveEdit(${id})">💾 Save</button> <button class="btn-delete" onclick="loadCreatures()">❌ Cancel</button>`;
        }

        async function saveEdit(id) {
            const { error } = await sb.from('Sea Creatures').update({
                sea_creature: document.getElementById(`edit-name-${id}`).value,
                scientific_name: document.getElementById(`edit-sci-${id}`).value,
                status: document.getElementById(`edit-sts-${id}`).value,
                source: document.getElementById(`edit-src-${id}`).value
            }).eq('id', id);
            if (error) alert("🔒 Authorization Required. Please log in."); else loadCreatures();
        }

        async function addNewCreature() {
            const { error } = await sb.from('Sea Creatures').insert([{
                sea_creature: document.getElementById('new-common-name').value,
                scientific_name: document.getElementById('new-scientific-name').value,
                status: document.getElementById('new-status').value,
                source: document.getElementById('new-source').value
            }]);
            if (error) alert("🔒 Admin Credentials Required."); else { loadCreatures(); document.querySelectorAll('.input-group input').forEach(i => i.value = ''); }
        }

async function uploadCSV() {
            const file = document.getElementById('csv-file').files[0], 
                  btn = document.getElementById('csv-btn'), 
                  bar = document.getElementById('progress-bar'), 
                  cont = document.getElementById('progress-container'), 
                  txt = document.getElementById('progress-text');

            if (!file) return alert("Select a CSV file first.");
            btn.disabled = true; cont.style.display = txt.style.display = "block";
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const rows = e.target.result.split('\n'), data = [];
                    rows.forEach((r, i) => {
                        const cols = r.split(',');
                        // Validation: Skip header or empty rows
                        if (cols[0]?.trim() && cols[0].toLowerCase() !== "sea creature") { 
                            data.push({ 
                                sea_creature: cols[0].trim(), 
                                scientific_name: cols[1]?.trim() || '', 
                                status: cols[2]?.trim() || '',
                                source: cols[3]?.trim() || 'CSV Update'
                            });
                        }
                        bar.style.width = Math.round(((i + 1) / rows.length) * 50) + "%";
                    });

                    txt.innerText = "Scanning for duplicates & deploying...";

                    // --- THE UPSERT FEATURE ---
                    // 'onConflict' tells Supabase which columns to check for duplicates
                    const { error } = await sb.from('Sea Creatures').upsert(data, { 
                        onConflict: 'sea_creature, scientific_name' 
                    });

                    if (error) throw error;

                    bar.style.width = "100%";
                    txt.innerText = "Ocean Registry Synced (Duplicates Updated)!";
                    loadCreatures();
                    alert("Registry Updated! Existing species were updated with the new source.");

                } catch (err) { 
                    console.error(err);
                    alert("❌ Sync Failed: " + err.message); 
                    bar.style.backgroundColor = "red"; 
                } finally { 
                    setTimeout(() => { 
                        btn.disabled = false; 
                        cont.style.display = txt.style.display = "none"; 
                        bar.style.width = "0%"; 
                    }, 3000); 
                }
            };
            reader.readAsText(file);
        }

        async function deleteCreature(id, name) { if (confirm(`Permanent removal of ${name}?`)) { const { error } = await sb.from('Sea Creatures').delete().eq('id', id); if (error) alert("🔒 Admin Access Only"); else loadCreatures(); } }
        function sortData(col) { sortOrder = !sortOrder; filteredData.sort((a, b) => { let vA = (a[col] || "").toString().toLowerCase(), vB = (b[col] || "").toString().toLowerCase(); return sortOrder ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1); }); renderTable(filteredData); }
        function filterTable() { const val = document.getElementById('search-input').value.toLowerCase(); filteredData = currentData.filter(i => Object.values(i).some(v => v?.toString().toLowerCase().includes(val))); renderTable(filteredData); }
        function exportToCSV() { let csv = "Sea Creature,Science,Status,Source,Date\n"; filteredData.forEach(i => csv += `"${i.sea_creature}","${i.scientific_name}","${i.status}","${i.source}","${formatDate(i.created_at)}"\n`); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'ocean_registry_v3_1.csv'; a.click(); }

        loadCreatures();
    </script>
</body>
</html>
