<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Research Registry 🐚</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(180deg, #0077be 0%, #003366 100%);
            background-attachment: fixed; color: #fff; transition: 0.5s;
            overflow-x: hidden;
        }
        :root { --glow: #00e5ff; --alert: #ff5252; --save: #00e676; --bg-card: rgba(255, 255, 255, 0.1); }
        .dark-mode { background: radial-gradient(circle, #001220 0%, #000 100%) !important; color: #b2ebf2 !important; }
        
        /* Stats Dashboard Styling */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; margin-bottom: 25px; 
        }
        .stat-card { 
            background: var(--bg-card); backdrop-filter: blur(10px); 
            padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--glow); }
        .stat-value { display: block; font-size: 1.8em; font-weight: bold; color: var(--glow); }
        .stat-label { font-size: 0.8em; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }

        #map { height: 450px; width: 100%; border-radius: 20px; margin-bottom: 25px; border: 2px solid var(--glow); background: #001220; z-index: 1; }
        
        /* Pinpoint Styling */
        .pinpoint-marker {
            background: var(--glow); border: 2px solid #003366;
            border-radius: 50% 50% 50% 0; width: 20px; height: 20px;
            transform: rotate(-45deg); display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: 0 0 10px var(--glow);
        }

        .table-container { 
            background: var(--bg-card); backdrop-filter: blur(12px); 
            border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.2); 
            overflow: hidden; 
        }
        table { width: 100%; border-collapse: collapse; color: #fff; table-layout: fixed; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); vertical-align: middle; }
        th { border-bottom: 2px solid var(--glow); cursor: pointer; user-select: none; }

        .col-name { width: 30%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-sci { width: 25%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-sts { width: 15%; }
        .col-src { width: 15%; }
        .col-act { width: 15%; text-align: right; }

        .col-name-link { cursor: pointer; color: var(--glow); font-weight: bold; }
        .coord-link { display: block; font-size: 0.7em; color: var(--glow); text-decoration: none; margin-top: 2px; opacity: 0.7; }
        
        button { padding: 8px 10px; background: var(--glow); color: #003366; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">🔱 Ocean Research Registry</h2>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total Species</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-endangered" style="color: #ffa726;">0</span>
            <span class="stat-label">Endangered</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-critical" style="color: var(--alert);">0</span>
            <span class="stat-label">Critical</span>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <label style="cursor:pointer;"><input type="checkbox" id="theme-toggle" onclick="toggleTheme()"> 🌙 Dark Mode</label>
    </div>

    <div id="map"></div>

    <div class="table-container">
        <input type="text" id="search-input" onkeyup="filterTable()" placeholder="🔍 Search records..." style="margin-bottom: 15px; width: 100%; padding:10px; border-radius:10px; background:rgba(255,255,255,0.1); border:1px solid var(--glow); color:white; box-sizing: border-box;">
        <table>
            <thead>
                <tr>
                    <th class="col-name" onclick="sortAlphabetically('sea_creature')">🐠 Name (Discovery) ↕️</th>
                    <th class="col-sci" onclick="sortAlphabetically('scientific_name')">📖 Scientific ↕️</th>
                    <th class="col-sts" onclick="sortAlphabetically('status')">🛡️ Status ↕️</th>
                    <th class="col-src" onclick="sortAlphabetically('source')">📋 Source ↕️</th>
                    <th class="col-act">⚙️ Actions</th>
                </tr>
            </thead>
            <tbody id="creature-table-body"></tbody>
        </table>
    </div>

    <div class="controls" style="margin-top: 25px; background: rgba(0, 51, 102, 0.5); padding: 20px; border-radius: 20px;">
        <div id="login-section">
            <input type="email" id="admin-email" placeholder="Researcher Email" style="width: 100%; margin-bottom: 5px; padding: 10px; border-radius: 8px; border: 1px solid var(--glow); background: rgba(255,255,255,0.1); color: white;">
            <input type="password" id="admin-password" placeholder="Access Key" style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid var(--glow); background: rgba(255,255,255,0.1); color: white;">
            <button onclick="adminSignIn()" style="width: 100%;">🔑 Admin Login</button>
        </div>
        <div id="auth-status" style="font-size: 0.8em; color: var(--glow); margin-top: 10px; text-align: center;">Status: 🌊 Viewing Mode</div>
        <div class="admin-only" style="margin-top: 15px;">
            <input type="file" id="csv-file" accept=".csv" style="color:white; margin-bottom:10px;">
            <button onclick="uploadCSV()" style="background: var(--save); width: 100%;">📥 Sync Registry CSV</button>
            <button onclick="adminSignOut()" style="background: var(--alert); color: white; margin-top:10px; width: 100%;">🚪 Logout</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _URL = 'https://dfuqjromqjmpeeymiejx.supabase.co', _KEY = 'sb_publishable_Tow5s3qQR_3ZOXZpDrjl4Q_a5xFXCRX';
        const _UNSPLASH_KEY = 'rwvKG94GLYXrI4AK7n8AEKI5WVrk4jv-gcf8c-TuOLM'; 
        const sb = window.supabase.createClient(_URL, _KEY);
        let currentData = [], filteredData = [], map, markers = {}, isAdmin = false;

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            updateUI(session);
            loadCreatures();
            initMap();
        }
        sb.auth.onAuthStateChange((_, s) => updateUI(s));
        
        function updateUI(s) {
            isAdmin = !!s;
            document.getElementById('login-section').style.display = s ? "none" : "block";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = s ? "block" : "none");
            document.getElementById('auth-status').innerText = s ? "✅ Admin Authorized" : "Status: 🌊 Viewing Mode";
            renderTable(filteredData);
        }

        async function adminSignIn() { 
            const e = document.getElementById('admin-email').value, p = document.getElementById('admin-password').value; 
            await sb.auth.signInWithPassword({ email: e, password: p }); 
        }
        async function adminSignOut() { await sb.auth.signOut(); location.reload(); }

        async function loadCreatures() {
            const { data, error } = await sb.from('Sea Creatures').select('*');
            if (!error) { 
                currentData = filteredData = data; 
                calculateStats();
                renderTable(data); 
                plotDiscoveries(); 
            }
        }

        function calculateStats() {
            const total = currentData.length;
            const endangered = currentData.filter(c => c.status.toLowerCase().includes('endangered') && !c.status.toLowerCase().includes('critically')).length;
            const critical = currentData.filter(c => c.status.toLowerCase().includes('critically endangered')).length;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-endangered').innerText = endangered;
            document.getElementById('stat-critical').innerText = critical;
        }

        function renderTable(list) {
            const body = document.getElementById('creature-table-body'); body.innerHTML = '';
            list.forEach(c => {
                const lat = parseFloat(c.latitude), lng = parseFloat(c.longitude);
                const hasCoords = !isNaN(lat) && !isNaN(lng);
                const gMaps = hasCoords ? `http://googleusercontent.com/maps.google.com/search?q=${lat},${lng}` : "#";
                
                body.innerHTML += `<tr id="row-${c.id}">
                    <td class="col-name">
                        <span class="col-name-link" onclick="focusOnMap(${lat}, ${lng}, ${c.id})">${c.sea_creature}</span>
                        <a href="${gMaps}" target="_blank" class="coord-link" onclick="event.stopPropagation();">
                            ${hasCoords ? `coordinates: ${lat.toFixed(2)}, ${lng.toFixed(2)}` : 'No Location Data'}
                        </a>
                    </td>
                    <td class="col-sci">${c.scientific_name}</td>
                    <td class="col-sts">${c.status}</td>
                    <td class="col-src">${c.source||'N/A'}</td>
                    <td class="col-act">
                        <button onclick="viewImageExternal('${c.sea_creature.replace(/'/g, "\\'")}')">🖼️</button>
                        ${isAdmin ? `<button onclick="deleteItem(${c.id})" style="background:var(--alert); color:white;">🗑</button>` : ''}
                    </td>
                </tr>`;
            });
        }

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([20, 0], 2); 
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
        }

        function plotDiscoveries() {
            Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};
            currentData.forEach(d => {
                const lat = parseFloat(d.latitude), lng = parseFloat(d.longitude);
                if (!isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0)) {
                    const pinIcon = L.divIcon({ className: 'pinpoint-marker', iconSize: [20, 20], popupAnchor: [10, 0] });
                    const popupContent = `<b onclick="viewImageExternal('${d.sea_creature.replace(/'/g, "\\'")}')">${d.sea_creature}</b><br>coordinates: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    markers[d.id] = L.marker([lat, lng], { icon: pinIcon }).bindPopup(popupContent).addTo(map);
                }
            });
        }

        function focusOnMap(lat, lng, id) {
            if (isNaN(lat) || isNaN(lng)) return;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            map.flyTo([lat, lng], 7, { animate: true, duration: 1.5 });
            setTimeout(() => { if (markers[id]) markers[id].openPopup(); }, 1600);
        }

        async function viewImageExternal(name) {
            const creature = currentData.find(c => c.sea_creature === name);
            const dbUrl = (creature && creature.image_url && creature.image_url.startsWith('http')) ? creature.image_url : null;
            if (dbUrl && !dbUrl.includes('wikipedia')) return window.open(dbUrl, '_blank');
            
            const newTab = window.open('about:blank', '_blank');
            newTab.document.write('<p style="font-family:sans-serif; text-align:center; margin-top:20%;">🔱 Sourcing Official Specimen Visuals...</p>');
            try {
                const response = await fetch(`https://api.unsplash.com/photos/random?query=${encodeURIComponent(name)},underwater&client_id=${_UNSPLASH_KEY}`);
                const data = await response.json();
                newTab.location.href = (data.urls && data.urls.regular) ? data.urls.regular : `https://placehold.co/800x600?text=${encodeURIComponent(name)}+Visual+Pending`;
            } catch (err) { newTab.location.href = `https://placehold.co/800x600?text=${encodeURIComponent(name)}+Visual+Pending`; }
        }

        async function uploadCSV() {
            const f = document.getElementById('csv-file').files[0]; if(!f) return;
            const reader = new FileReader(); reader.onload = async (e) => {
                const lines = e.target.result.split('\n'), data = [];
                lines.forEach(l => {
                    const c = l.split(',');
                    if (c[0] && c[0].toLowerCase() !== 'sea creature') {
                        data.push({ sea_creature: c[0].trim(), scientific_name: c[1]?.trim(), status: c[2]?.trim(), source: c[3]?.trim(), latitude: parseFloat(c[4]), longitude: parseFloat(c[5]), image_url: c[6]?.trim() || null });
                    }
                });
                await sb.from('Sea Creatures').upsert(data, { onConflict: 'sea_creature,scientific_name' });
                loadCreatures();
            }; reader.readAsText(f);
        }

        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function filterTable() { 
            const val = document.getElementById('search-input').value.toLowerCase(); 
            filteredData = currentData.filter(c => Object.values(c).some(v => String(v).toLowerCase().includes(val))); 
            renderTable(filteredData); 
        }
        checkSession();
    </script>
</body>
</html>
