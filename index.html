<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Research Registry 🐚</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(180deg, #0077be 0%, #003366 100%);
            background-attachment: fixed; color: #fff; transition: 0.5s;
        }
        :root { --glow: #00e5ff; --alert: #ff5252; --save: #00e676; }
        .deep-sea-mode { background: radial-gradient(circle, #001220 0%, #000 100%) !important; color: #b2ebf2 !important; }
        
        /* Fixed Map Header & Glow Removal */
        #map { height: 450px; width: 100%; border-radius: 20px; margin-bottom: 25px; border: 2px solid var(--glow); background: #001220; z-index: 1; position: relative; }
        .leaflet-top.leaflet-left { display: none !important; } 

        /* Submarine Marker Styling */
        .sub-marker { background: rgba(0, 229, 255, 0.2); border: 2px solid var(--glow); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: subPulse 2s infinite ease-in-out; }
        @keyframes subPulse { 0% { transform: scale(1); box-shadow: 0 0 5px var(--glow); } 50% { transform: scale(1.15); box-shadow: 0 0 15px var(--glow); } 100% { transform: scale(1); box-shadow: 0 0 5px var(--glow); } }

        .table-container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.2); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; color: #fff; min-width: 800px; }
        th { padding: 12px; text-align: left; border-bottom: 2px solid var(--glow); cursor: pointer; }
        td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); vertical-align: middle; }
        
        .col-name-link { cursor: pointer; color: var(--glow); font-weight: bold; }
        .coord-link { display: block; font-size: 0.75em; color: var(--glow); text-decoration: none; margin-top: 4px; opacity: 0.7; }
        
        button { padding: 8px 12px; background: var(--glow); color: #003366; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-right: 4px; }
        .btn-view { background: #ffeb3b; color: #333; }
        
        #gallery-modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); cursor: zoom-out; backdrop-filter: blur(5px); }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">🔱 Underwater Research Registry</h2>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <label style="cursor:pointer;"><input type="checkbox" id="theme-toggle" onclick="toggleTheme()"> 🌙 DEEP SEA MODE</label>
    </div>

    <div id="map"></div>

    <div class="table-container">
        <input type="text" id="search-input" onkeyup="filterTable()" placeholder="🔍 Search records..." style="margin-bottom: 15px; width: 100%; padding:10px; border-radius:10px; background:rgba(255,255,255,0.1); border:1px solid var(--glow); color:white;">
        <table>
            <thead>
                <tr>
                    <th onclick="sortAlphabetically('sea_creature')">🧬 Name (Click for Map) ↕️</th>
                    <th onclick="sortAlphabetically('scientific_name')">📖 Scientific ↕️</th>
                    <th onclick="sortAlphabetically('status')">📍 Status ↕️</th>
                    <th onclick="sortAlphabetically('source')">📋 Source ↕️</th>
                    <th>⚙️ Actions</th>
                </tr>
            </thead>
            <tbody id="creature-table-body"></tbody>
        </table>
    </div>

    <div class="controls">
        <div id="login-section">
            <input type="email" id="admin-email" placeholder="Researcher Email" style="width: 100%; margin-bottom: 5px; padding: 10px; border-radius: 8px;">
            <input type="password" id="admin-password" placeholder="Access Key" style="width: 100%; margin-bottom: 5px; padding: 10px; border-radius: 8px;">
            <button onclick="adminSignIn()" style="width: 100%;">🔑 Admin Login</button>
        </div>
        <div id="auth-status" style="font-size: 0.8em; color: var(--glow); margin-top: 10px;">Status: 🌊 Viewing Mode</div>
        <div class="admin-only" style="margin-top: 15px;">
            <button onclick="adminSignOut()" style="background: var(--alert); color: white;">🚪 Logout</button>
        </div>
    </div>

    <div id="gallery-modal" onclick="closeGallery()">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; max-width: 600px;">
            <img id="gallery-img" src="" style="width: 100%; border-radius: 20px; border: 3px solid var(--glow); background: #000;" onerror="this.src='https://placehold.co/600x400?text=Image+Not+Found'">
            <h2 id="gallery-title" style="margin-top: 15px; text-shadow: 0 0 10px #000;"></h2>
            <p>Click anywhere to close</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _URL = 'https://dfuqjromqjmpeeymiejx.supabase.co', _KEY = 'sb_publishable_Tow5s3qQR_3ZOXZpDrjl4Q_a5xFXCRX';
        const sb = window.supabase.createClient(_URL, _KEY);
        let currentData = [], filteredData = [], map, markers = {}, isAdmin = false;

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            updateUI(session);
            loadCreatures();
            initMap();
        }
        sb.auth.onAuthStateChange((_, s) => updateUI(s));
        
        function updateUI(s) {
            isAdmin = !!s;
            document.getElementById('login-section').style.display = s ? "none" : "block";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = s ? "block" : "none");
            document.getElementById('auth-status').innerText = s ? "✅ Admin Authorized" : "Status: 🌊 Viewing Mode";
            renderTable(filteredData);
        }

        async function adminSignIn() { 
            const e = document.getElementById('admin-email').value, p = document.getElementById('admin-password').value; 
            await sb.auth.signInWithPassword({ email: e, password: p }); 
        }
        async function adminSignOut() { await sb.auth.signOut(); location.reload(); }

        async function loadCreatures() {
            const { data, error } = await sb.from('Sea Creatures').select('*');
            if (!error) { currentData = filteredData = data; renderTable(data); plotDiscoveries(); }
        }

        function renderTable(list) {
            const body = document.getElementById('creature-table-body'); body.innerHTML = '';
            list.forEach(c => {
                const hasCoords = c.latitude !== null && c.longitude !== null;
                // FIX: Correct Google Maps URL structure
                const gMaps = hasCoords ? `https://www.google.com/maps?q=${c.latitude},${c.longitude}` : '#';
                
                body.innerHTML += `<tr id="row-${c.id}">
                    <td>
                        <span class="col-name-link" onclick="${hasCoords ? `jumpToMarker(${c.latitude}, ${c.longitude}, ${c.id})` : `alert('No coords')`}">
                            🚢 ${c.sea_creature}
                        </span>
                        <a href="${gMaps}" target="_blank" class="coord-link" onclick="event.stopPropagation();">
                            ${hasCoords ? `${c.latitude.toFixed(2)}, ${c.longitude.toFixed(2)}` : 'Location Pending'}
                        </a>
                    </td>
                    <td>${c.scientific_name}</td>
                    <td>${c.status}</td>
                    <td>${c.source||'N/A'}</td>
                    <td>
                        <button class="btn-view" onclick="openGallery('${c.sea_creature}')">🖼️</button>
                        ${isAdmin ? `<button onclick="deleteItem(${c.id})" style="background:var(--alert); color:white;">🗑</button>` : ''}
                    </td>
                </tr>`;
            });
        }

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([20, 0], 2); 
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
        }

        function plotDiscoveries() {
            Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};
            currentData.filter(c => c.latitude && c.longitude).forEach(d => {
                const submarineIcon = L.divIcon({ className: 'sub-marker', html: '🚢', iconSize: [30, 30] });
                markers[d.id] = L.marker([d.latitude, d.longitude], { icon: submarineIcon }).bindPopup(`<b>${d.sea_creature}</b>`).addTo(map);
            });
        }

        function jumpToMarker(lat, lng, id) {
            map.flyTo([lat, lng], 4, { animate: true, duration: 1.5 });
            if (markers[id]) markers[id].openPopup();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openGallery(name) {
            const img = document.getElementById('gallery-img');
            const creature = currentData.find(c => c.sea_creature === name);
            // FIX: Reliable image fallback engine
            img.src = (creature && creature.image_url) ? creature.image_url : `https://loremflickr.com/600/400/${name},underwater`;
            document.getElementById('gallery-title').innerText = name;
            document.getElementById('gallery-modal').style.display = 'block'; 
        }
        function closeGallery() { document.getElementById('gallery-modal').style.display = 'none'; }

        function toggleTheme() { document.body.classList.toggle('deep-sea-mode'); }
        checkSession();
    </script>
</body>
</html>
