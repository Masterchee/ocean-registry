<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Research Command Center 🐚</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Modern CSS Variables */
        :root {
            --bg-gradient-top: #001f3f;
            --bg-gradient-bottom: #000a12;
            --primary-glow: #00e5ff;
            --danger: #ff4d4d;
            --success: #00e676;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(0, 229, 255, 0.2);
            --text-main: #e0f7fa;
            --text-muted: #80deea;
        }

        /* Global Reset & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, var(--bg-gradient-top), var(--bg-gradient-bottom));
            background-attachment: fixed; 
            color: var(--text-main); 
            padding: 2rem; 
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Typography */
        h1 { text-align: center; font-size: 2.5rem; margin-bottom: 2rem; text-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        
        /* Glassmorphism Components */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Dashboard Stats */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 1.5rem; 
            margin-bottom: 2rem; 
        }
        .stat-card { text-align: center; transition: transform 0.2s ease, border-color 0.2s ease; }
        .stat-card:hover { transform: translateY(-4px); border-color: var(--primary-glow); }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: var(--primary-glow); line-height: 1; margin-bottom: 0.5rem; display: block; }
        .stat-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; }

        /* Map Configuration */
        #map { 
            height: 450px; 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 2rem; 
            border: 1px solid var(--glass-border); 
            z-index: 1; 
        }
        .pinpoint-marker {
            background: var(--primary-glow);
            border: 2px solid #000;
            border-radius: 50% 50% 50% 0;
            width: 22px; height: 22px;
            transform: rotate(-45deg);
            box-shadow: 0 0 15px var(--primary-glow);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pinpoint-marker:hover { transform: rotate(-45deg) scale(1.2); }
        .leaflet-popup-content-wrapper { background: rgba(0, 10, 18, 0.9); color: #fff; border: 1px solid var(--primary-glow); }
        .leaflet-popup-tip { background: rgba(0, 10, 18, 0.9); }
        .leaflet-popup-content b { color: var(--primary-glow); cursor: pointer; text-decoration: none; border-bottom: 1px dashed var(--primary-glow); }

        /* Data Table */
        .table-container { overflow: hidden; }
        .search-bar {
            width: 100%; padding: 1rem; border-radius: 12px;
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border);
            color: #fff; font-size: 1rem; margin-bottom: 1.5rem; outline: none; transition: border-color 0.3s;
        }
        .search-bar:focus { border-color: var(--primary-glow); }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { font-weight: 600; color: var(--text-muted); cursor: pointer; user-select: none; transition: color 0.2s; }
        th:hover { color: var(--primary-glow); }
        
        .col-name { width: 30%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .col-sci { width: 25%; font-style: italic; opacity: 0.9; }
        .col-sts { width: 15%; }
        .col-src { width: 15%; opacity: 0.8; }
        .col-act { width: 15%; text-align: right; }

        .name-link { color: #fff; font-weight: 700; cursor: pointer; transition: color 0.2s; }
        .name-link:hover { color: var(--primary-glow); }
        .coord-text { display: block; font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-family: monospace; }

        /* Buttons & Controls */
        button { 
            padding: 0.6rem 1rem; background: rgba(0, 229, 255, 0.1); color: var(--primary-glow); 
            border: 1px solid var(--primary-glow); border-radius: 8px; cursor: pointer; 
            font-weight: 600; transition: all 0.2s ease; 
        }
        button:hover { background: var(--primary-glow); color: #000; }
        .btn-danger { color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }

        .admin-panel { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 400px; margin-inline: auto; }
        .admin-panel input { padding: 0.8rem; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main>
        <h1>🔱 Ocean Research Command Center</h1>
        
        <section class="stats-grid">
            <div class="glass-panel stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Species Logged</span>
            </div>
            <div class="glass-panel stat-card">
                <span class="stat-value" id="stat-endangered" style="color: #ffb74d;">0</span>
                <span class="stat-label">Endangered</span>
            </div>
            <div class="glass-panel stat-card">
                <span class="stat-value" id="stat-critical" style="color: var(--danger);">0</span>
                <span class="stat-label">Critical Priority</span>
            </div>
        </section>

        <div id="map"></div>

        <section class="glass-panel table-container">
            <input type="text" id="search-input" class="search-bar" placeholder="🔍 Search database (e.g., 'Shark', 'Vulnerable')...">
            <table>
                <thead>
                    <tr>
                        <th class="col-name" data-sort="sea_creature">🐠 Fish (Discovered At) ↕️</th>
                        <th class="col-sci" data-sort="scientific_name">📖 Taxonomy ↕️</th>
                        <th class="col-sts" data-sort="status">🛡️ Conservation ↕️</th>
                        <th class="col-src" data-sort="source">📋 Source ↕️</th>
                        <th class="col-act">⚙️ Search</th>
                    </tr>
                </thead>
                <tbody id="registry-body">
                    <tr><td colspan="5" style="text-align: center; color: var(--primary-glow);">Calibrating Database...</td></tr>
                </tbody>
            </table>
        </section>

        <section class="glass-panel admin-panel" id="auth-container">
            <div id="login-view" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <input type="email" id="admin-email" placeholder="Researcher ID (Email)">
                <input type="password" id="admin-password" placeholder="Clearance Key">
                <button onclick="App.authenticate()">🔑 Access Uplink</button>
            </div>
            
            <div id="admin-view" class="hidden" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <div style="text-align: center; color: var(--success); font-size: 0.85rem; margin-bottom: 0.5rem;">✅ Connection Secure</div>
                <input type="file" id="csv-file" accept=".csv" style="padding: 0; border: none; background: transparent;">
                <button onclick="App.processCSV()" style="background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success);">📥 Sync Telemetry (CSV)</button>
                <button onclick="App.terminateSession()" class="btn-danger">🚪 Terminate Session</button>
            </div>
        </section>
    </main>

    <script>
        /** * GEMINI 3.1 ARCHITECTURE */
        class OceanRegistryApp {
            constructor() {
                this.DB_URL = 'https://dfuqjromqjmpeeymiejx.supabase.co';
                this.DB_KEY = 'sb_publishable_Tow5s3qQR_3ZOXZpDrjl4Q_a5xFXCRX';
                
                this.supabase = window.supabase.createClient(this.DB_URL, this.DB_KEY);
                this.mapInstance = null;
                this.mapMarkers = new Map();
                
                this.state = { data: [], filtered: [], isAdmin: false, sortAsc: true };
                
                this.init();
            }

            async init() {
                this.initMap();
                this.setupEventListeners();
                
                const { data: { session } } = await this.supabase.auth.getSession();
                this.updateAuthUI(!!session);
                await this.fetchTelemetry();
            }

            // --- EMOJI INTELLIGENCE ROUTER ---
            getEmoji(name) {
                const n = name.toLowerCase();
                if (n.includes('shark')) return '🦈';
                if (n.includes('whale') || n.includes('narwhal')) return '🐋';
                if (n.includes('dolphin') || n.includes('vaquita') || n.includes('porpoise')) return '🐬';
                if (n.includes('octopus')) return '🐙';
                if (n.includes('squid')) return '🦑';
                if (n.includes('turtle')) return '🐢';
                if (n.includes('penguin')) return '🐧';
                if (n.includes('seal') || n.includes('walrus') || n.includes('sea lion')) return '🦭';
                if (n.includes('shrimp')) return '🦐';
                if (n.includes('crab') || n.includes('isopod')) return '🦀';
                if (n.includes('jellyfish')) return '🪼';
                if (n.includes('ray') || n.includes('manta')) return '🌊'; 
                return '🐟'; // Default fallback
            }

            // --- MAP LOGIC ---
            initMap() {
                this.mapInstance = L.map('map', { zoomControl: false }).setView([20, 0], 2);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap | CartoDB'
                }).addTo(this.mapInstance);
            }

            plotCoordinates() {
                this.mapMarkers.forEach(marker => this.mapInstance.removeLayer(marker));
                this.mapMarkers.clear();

                const icon = L.divIcon({ className: 'pinpoint-marker', iconSize: [22, 22], popupAnchor: [11, 0] });

                this.state.filtered.forEach(record => {
                    const lat = parseFloat(record.latitude);
                    const lng = parseFloat(record.longitude);

                    if (!isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0)) {
                        // The bold tag now triggers the Google Image Search
                        const popupHTML = `
                            <b onclick="App.requestVisual('${record.sea_creature.replace(/'/g, "\\'")}')">
                                ${this.getEmoji(record.sea_creature)} ${record.sea_creature}
                            </b><br>
                            <span style="font-family: monospace; opacity: 0.8;">[${lat.toFixed(4)}, ${lng.toFixed(4)}]</span>
                        `;
                        const marker = L.marker([lat, lng], { icon }).bindPopup(popupHTML).addTo(this.mapInstance);
                        this.mapMarkers.set(record.id, marker);
                    }
                });
            }

            focusCoordinates(lat, lng, id) {
                if (isNaN(lat) || isNaN(lng)) return;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.mapInstance.flyTo([lat, lng], 6, { animate: true, duration: 1.5 });
                setTimeout(() => { 
                    const marker = this.mapMarkers.get(id);
                    if (marker) marker.openPopup(); 
                }, 1600);
            }

            // --- DATA LOGIC ---
            async fetchTelemetry() {
                try {
                    const { data, error } = await this.supabase.from('Sea Creatures').select('*');
                    if (error) throw error;
                    this.state.data = data;
                    this.state.filtered = [...data];
                    this.updateDashboard();
                    this.renderTable();
                    this.plotCoordinates();
                } catch (err) {
                    console.error("Telemetry Sync Failed:", err);
                    document.getElementById('registry-body').innerHTML = `<tr><td colspan="5" style="color:var(--danger); text-align:center;">Database Offline</td></tr>`;
                }
            }

            updateDashboard() {
                document.getElementById('stat-total').innerText = this.state.data.length;
                
                const endangered = this.state.data.filter(c => {
                    const status = c.status.toLowerCase();
                    return status.includes('endangered') && !status.includes('critically');
                }).length;
                
                const critical = this.state.data.filter(c => 
                    c.status.toLowerCase().includes('critically endangered')
                ).length;

                document.getElementById('stat-endangered').innerText = endangered;
                document.getElementById('stat-critical').innerText = critical;
            }

            renderTable() {
                const tbody = document.getElementById('registry-body');
                if (this.state.filtered.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No records found matching query.</td></tr>`;
                    return;
                }

                tbody.innerHTML = this.state.filtered.map(record => {
                    const lat = parseFloat(record.latitude);
                    const lng = parseFloat(record.longitude);
                    const validCoords = !isNaN(lat) && !isNaN(lng);
                    const safeName = record.sea_creature.replace(/'/g, "\\'");
                    
                    const emoji = this.getEmoji(record.sea_creature);

                    return `
                        <tr>
                            <td class="col-name">
                                <span class="name-link" onclick="App.focusCoordinates(${lat}, ${lng}, ${record.id})">
                                    ${emoji} ${record.sea_creature}
                                </span>
                                <span class="coord-text">${validCoords ? `[ ${lat.toFixed(2)}, ${lng.toFixed(2)} ]` : 'Location Unknown'}</span>
                            </td>
                            <td class="col-sci">${record.scientific_name}</td>
                            <td class="col-sts">${record.status}</td>
                            <td class="col-src">${record.source || 'N/A'}</td>
                            <td class="col-act">
                                <button onclick="App.requestVisual('${safeName}')" title="Google Image Search">🖼️</button>
                                ${this.state.isAdmin ? `<button class="btn-danger" onclick="App.deleteRecord(${record.id})" style="margin-left: 5px;">🗑️</button>` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            // --- GOOGLE IMAGE SEARCH ENGINE ---
            requestVisual(name) {
                // Instantly opens a new tab directed to Google Images for the specified text
                const googleImagesUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(name)}`;
                window.open(googleImagesUrl, '_blank');
            }

            // --- UTILITIES & AUTH ---
            setupEventListeners() {
                document.getElementById('search-input').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    this.state.filtered = this.state.data.filter(c => 
                        Object.values(c).some(val => String(val).toLowerCase().includes(term))
                    );
                    this.renderTable();
                    this.plotCoordinates();
                });

                document.querySelectorAll('th[data-sort]').forEach(th => {
                    th.addEventListener('click', () => {
                        const key = th.dataset.sort;
                        this.state.sortAsc = !this.state.sortAsc;
                        this.state.filtered.sort((a, b) => {
                            const valA = String(a[key] || '').toLowerCase();
                            const valB = String(b[key] || '').toLowerCase();
                            if (valA < valB) return this.state.sortAsc ? -1 : 1;
                            if (valA > valB) return this.state.sortAsc ? 1 : -1;
                            return 0;
                        });
                        this.renderTable();
                    });
                });
            }

            updateAuthUI(isLoggedIn) {
                this.state.isAdmin = isLoggedIn;
                document.getElementById('login-view').classList.toggle('hidden', isLoggedIn);
                document.getElementById('admin-view').classList.toggle('hidden', !isLoggedIn);
                this.renderTable(); 
            }

            async authenticate() {
                const email = document.getElementById('admin-email').value;
                const password = document.getElementById('admin-password').value;
                const { error } = await this.supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Authentication Failed: " + error.message);
                else this.updateAuthUI(true);
            }

            async terminateSession() {
                await this.supabase.auth.signOut();
                this.updateAuthUI(false);
            }

            async processCSV() {
                const file = document.getElementById('csv-file').files[0];
                if (!file) return alert("Select a CSV payload first.");
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const lines = e.target.result.split('\n');
                    
                    const payload = lines.slice(1).filter(l => l.trim()).map(l => {
                        const cols = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => 
                            col.trim().replace(/^"|"$/g, '') 
                        );
                        
                        return {
                            sea_creature: cols[0],
                            scientific_name: cols[1] || null,
                            status: cols[2] || null,
                            source: cols[3] || null,
                            latitude: parseFloat(cols[4]),
                            longitude: parseFloat(cols[5]),
                            image_url: cols[6] || null
                        };
                    });

                    const { error } = await this.supabase.from('Sea Creatures').upsert(payload, { onConflict: 'sea_creature,scientific_name' });
                    
                    if (error) {
                        alert("Sync Error: " + error.message);
                    } else {
                        alert("Telemetry Sync Complete.");
                        document.getElementById('csv-file').value = ''; 
                        this.fetchTelemetry();
                    }
                };
                reader.readAsText(file);
            }

            async deleteRecord(id) {
                if(!confirm("Eradicate this record from the database?")) return;
                await this.supabase.from('Sea Creatures').delete().eq('id', id);
                this.fetchTelemetry();
            }
        }

        // Initialize App Globally
        const App = new OceanRegistryApp();
    </script>
</body>
</html>
