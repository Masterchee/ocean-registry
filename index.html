<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Research Registry 🐚</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(180deg, #0077be 0%, #003366 100%);
            background-attachment: fixed; color: #fff; transition: 0.5s;
            overflow-x: hidden; /* Prevent body-level horizontal scrolling */
        }
        :root { --glow: #00e5ff; --alert: #ff5252; --save: #00e676; }
        .dark-mode { background: radial-gradient(circle, #001220 0%, #000 100%) !important; color: #b2ebf2 !important; }
        
        #map { height: 400px; width: 100%; border-radius: 20px; margin-bottom: 25px; border: 2px solid var(--glow); background: #001220; z-index: 1; position: relative; }
        .leaflet-top.leaflet-left { display: none !important; } 

        /* Table Width and Scroll Fixes */
        .table-container { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); 
            border-radius: 20px; 
            padding: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            overflow: hidden; /* Eliminates horizontal scroll bars */
        }
        table { width: 100%; border-collapse: collapse; color: #fff; table-layout: fixed; } /* Strict table width */
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); vertical-align: middle; }
        th { border-bottom: 2px solid var(--glow); cursor: pointer; }

        /* Reduced Widths for Table Columns */
        .col-name { width: 28%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-sci { width: 22%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-sts { width: 18%; }
        .col-src { width: 15%; }
        .col-act { width: 17%; text-align: right; }

        .col-name-link { cursor: pointer; color: var(--glow); font-weight: bold; }
        .coord-link { display: block; font-size: 0.7em; color: var(--glow); text-decoration: none; margin-top: 2px; opacity: 0.7; }
        .coord-link:hover { text-decoration: underline; opacity: 1; }
        
        button { padding: 8px 10px; background: var(--glow); color: #003366; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        #gallery-modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); cursor: zoom-out; backdrop-filter: blur(10px); }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">🔱 Underwater Research Registry</h2>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <label style="cursor:pointer;"><input type="checkbox" id="theme-toggle" onclick="toggleTheme()"> 🌙 Dark Mode</label>
    </div>

    <div id="map"></div>

    <div class="table-container">
        <input type="text" id="search-input" onkeyup="filterTable()" placeholder="🔍 Search records..." style="margin-bottom: 15px; width: 100%; padding:10px; border-radius:10px; background:rgba(255,255,255,0.1); border:1px solid var(--glow); color:white; box-sizing: border-box;">
        <table>
            <thead>
                <tr>
                    <th class="col-name" onclick="sortAlphabetically('sea_creature')">🐙 Name (Dive) ↕️</th>
                    <th class="col-sci" onclick="sortAlphabetically('scientific_name')">📖 Scientific Name ↕️</th>
                    <th class="col-sts" onclick="sortAlphabetically('status')">🛡️ Status ↕️</th>
                    <th class="col-src" onclick="sortAlphabetically('source')">📋 Source ↕️</th>
                    <th class="col-act">⚙️ Actions</th>
                </tr>
            </thead>
            <tbody id="creature-table-body"></tbody>
        </table>
    </div>

    <div class="controls" style="margin-top: 25px; background: rgba(0, 51, 102, 0.5); padding: 20px; border-radius: 20px;">
        <div id="login-section">
            <input type="email" id="admin-email" placeholder="Researcher Email" style="width: 100%; margin-bottom: 5px; padding: 10px; border-radius: 8px; border: 1px solid var(--glow); background: rgba(255,255,255,0.1); color: white;">
            <input type="password" id="admin-password" placeholder="Access Key" style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid var(--glow); background: rgba(255,255,255,0.1); color: white;">
            <button onclick="adminSignIn()" style="width: 100%;">🔑 Admin Login</button>
        </div>
        <div id="auth-status" style="font-size: 0.8em; color: var(--glow); margin-top: 10px; text-align: center;">Status: 🌊 Viewing Mode</div>
        
        <div class="admin-only" style="margin-top: 15px;">
            <input type="file" id="csv-file" accept=".csv" style="color:white; margin-bottom:10px;">
            <button onclick="uploadCSV()" style="background: var(--save); width: 100%;">📥 Sync Registry CSV</button>
            <button onclick="adminSignOut()" style="background: var(--alert); color: white; margin-top:10px; width: 100%;">🚪 Logout</button>
        </div>
    </div>

    <div id="gallery-modal" onclick="closeGallery()">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; max-width: 600px;">
            <img id="gallery-img" src="" style="width: 100%; border-radius: 20px; border: 3px solid var(--glow); background: #000;" onerror="this.src='https://placehold.co/600x400?text=Image+Not+Found'">
            <h2 id="gallery-title" style="margin-top: 15px; text-shadow: 0 0 10px #000;"></h2>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _URL = 'https://dfuqjromqjmpeeymiejx.supabase.co', _KEY = 'sb_publishable_Tow5s3qQR_3ZOXZpDrjl4Q_a5xFXCRX';
        const sb = window.supabase.createClient(_URL, _KEY);
        let currentData = [], filteredData = [], map, markers = {}, isAdmin = false;

        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            updateUI(session);
            loadCreatures();
            initMap();
        }
        sb.auth.onAuthStateChange((_, s) => updateUI(s));
        
        function updateUI(s) {
            isAdmin = !!s;
            document.getElementById('login-section').style.display = s ? "none" : "block";
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = s ? "block" : "none");
            document.getElementById('auth-status').innerText = s ? "✅ Admin Authorized" : "Status: 🌊 Viewing Mode";
            renderTable(filteredData);
        }

        async function adminSignIn() { 
            const e = document.getElementById('admin-email').value, p = document.getElementById('admin-password').value; 
            await sb.auth.signInWithPassword({ email: e, password: p }); 
        }
        async function adminSignOut() { await sb.auth.signOut(); location.reload(); }

        async function loadCreatures() {
            const { data, error } = await sb.from('Sea Creatures').select('*');
            if (!error) { currentData = filteredData = data; renderTable(data); plotDiscoveries(); }
        }

        function renderTable(list) {
            const body = document.getElementById('creature-table-body'); body.innerHTML = '';
            list.forEach(c => {
                const lat = parseFloat(c.latitude), lng = parseFloat(c.longitude);
                const hasCoords = !isNaN(lat) && !isNaN(lng);
                
                // FIXED GOOGLE MAPS LINK: Properly concatenates values to avoid 404 brace error
                const gMaps = hasCoords ? "https://www.google.com/maps/search/?api=1&query=" + lat + "," + lng : "#";
                
                body.innerHTML += `<tr id="row-${c.id}">
                    <td class="col-name">
                        <span class="col-name-link" onclick="deepDiveTrigger('${c.sea_creature.replace(/'/g, "\\'")}', ${lat}, ${lng}, ${c.id})">
                            ${c.sea_creature}
                        </span>
                        <a href="${gMaps}" target="_blank" class="coord-link" onclick="event.stopPropagation();">
                            ${hasCoords ? "coordinates: " + lat.toFixed(2) + ", " + lng.toFixed(2) : 'No Location Data'}
                        </a>
                    </td>
                    <td class="col-sci">${c.scientific_name}</td>
                    <td class="col-sts">${c.status}</td>
                    <td class="col-src">${c.source||'N/A'}</td>
                    <td class="col-act">
                        <button onclick="openGallery('${c.sea_creature.replace(/'/g, "\\'")}')">🖼️</button>
                        ${isAdmin ? `<button onclick="deleteItem(${c.id})" style="background:var(--alert); color:white;">🗑</button>` : ''}
                    </td>
                </tr>`;
            });
        }

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([20, 0], 2); 
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
        }

        function plotDiscoveries() {
            Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};
            currentData.forEach(d => {
                const lat = parseFloat(d.latitude), lng = parseFloat(d.longitude);
                // STRICT LOCK: Prevents markers from appearing at top-left [0,0] if coordinates are invalid
                if (!isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0)) {
                    // Removed custom submarine/ship icon from discovery map as requested
                    markers[d.id] = L.marker([lat, lng]).bindPopup("<b>" + d.sea_creature + "</b>").addTo(map);
                }
            });
        }

        function deepDiveTrigger(name, lat, lng, id) {
            if (isNaN(lat) || isNaN(lng)) return;
            map.flyTo([lat, lng], 7, { animate: true, duration: 1.5 });
            setTimeout(() => {
                if (markers[id]) markers[id].openPopup();
                openGallery(name);
            }, 1600);
        }

        function openGallery(name) {
            const img = document.getElementById('gallery-img');
            const creature = currentData.find(c => c.sea_creature === name);
            // RELIABLE IMAGE ENGINE: Uses high-fidelity search keyword to fix "Image Not Found"
            const fallback = "https://loremflickr.com/600/400/" + encodeURIComponent(name) + ",underwater/all";
            img.src = (creature && creature.image_url && creature.image_url.startsWith('http')) ? creature.image_url : fallback;
            document.getElementById('gallery-title').innerText = name;
            document.getElementById('gallery-modal').style.display = 'block'; 
        }

        async function uploadCSV() {
            const f = document.getElementById('csv-file').files[0]; if(!f) return;
            const reader = new FileReader(); reader.onload = async (e) => {
                const lines = e.target.result.split('\n'), data = [];
                lines.forEach(l => {
                    const c = l.split(',');
                    if (c[0] && c[0].toLowerCase() !== 'sea creature') {
                        data.push({
                            sea_creature: c[0].trim(),
                            scientific_name: c[1]?.trim(),
                            status: c[2]?.trim(),
                            source: c[3]?.trim(),
                            latitude: parseFloat(c[4]), 
                            longitude: parseFloat(c[5]),
                            image_url: c[6]?.trim() || null
                        });
                    }
                });
                await sb.from('Sea Creatures').upsert(data, { onConflict: 'sea_creature,scientific_name' });
                loadCreatures();
            }; reader.readAsText(f);
        }

        function closeGallery() { document.getElementById('gallery-modal').style.display = 'none'; }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function filterTable() { const val = document.getElementById('search-input').value.toLowerCase(); filteredData = currentData.filter(c => Object.values(c).some(v => String(v).toLowerCase().includes(val))); renderTable(filteredData); }
        checkSession();
    </script>
</body>
</html>
